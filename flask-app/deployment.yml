kind: Deployment
apiVersion: apps/v1

metadata:
   name: flask-app-deployemnt
   namespace: flask-app
   labels:
     app: flask-app-label

specs:
   replicas: 7
   selector:
       matchLabels:
            app: flask-app-label
   template:
     metadata:
      labels:
        app: flask-app-label

     spec:
       containers:
        - name: flask-app
          image:
          ports:
          - containerPort: 80